<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>プロンプト保管庫</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #22223a;
    --surface2: #2a2a45;
    --border: #3a3a5c;
    --accent: #c97c3a;
    --accent2: #a0522d;
    --text: #e8e6f0;
    --text-muted: #9090b0;
    --tag-bg: #2e2e50;
    --success: #4caf80;
    --danger: #e05555;
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ===== ヘッダー ===== */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.05em;
  }
  header span {
    font-size: 11px;
    color: var(--text-muted);
  }

  /* ===== レイアウト ===== */
  .layout {
    display: flex;
    height: calc(100vh - 53px);
  }

  /* ===== サイドバー ===== */
  .sidebar {
    width: 200px;
    min-width: 200px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-title {
    font-size: 11px;
    color: var(--text-muted);
    padding: 14px 16px 8px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .cat-list {
    flex: 1;
    overflow-y: auto;
  }
  .cat-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 16px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: background 0.15s, border-color 0.15s;
    user-select: none;
  }
  .cat-item:hover { background: var(--surface2); }
  .cat-item.active {
    background: var(--surface2);
    border-left-color: var(--accent);
    color: var(--accent);
  }
  .cat-item span { flex: 1; font-size: 13px; }
  .cat-count {
    font-size: 10px;
    color: var(--text-muted);
    background: var(--tag-bg);
    border-radius: 10px;
    padding: 1px 6px;
    margin-right: 4px;
  }
  .cat-edit-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 12px;
    padding: 2px 4px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .cat-item:hover .cat-edit-btn { opacity: 1; }
  .sidebar-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
  }

  /* ===== メインエリア ===== */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }
  .main-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .main-header h2 {
    font-size: 15px;
    font-weight: 600;
  }

  /* ===== プロンプトカード ===== */
  .prompt-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .prompt-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    transition: border-color 0.15s;
  }
  .prompt-card:hover { border-color: var(--accent); }
  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 8px;
  }
  .card-title {
    font-size: 14px;
    font-weight: 600;
    flex: 1;
  }
  .card-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .card-body {
    font-size: 12px;
    color: var(--text-muted);
    white-space: pre-wrap;
    word-break: break-all;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    max-height: 120px;
    overflow-y: auto;
    line-height: 1.7;
    margin-bottom: 10px;
    cursor: pointer;
    position: relative;
  }
  .card-body:hover::after {
    content: "タップでコピー";
    position: absolute;
    inset: 0;
    background: rgba(201,124,58,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: var(--accent);
    border-radius: var(--radius-sm);
  }
  .card-footer {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .cat-tag {
    font-size: 10px;
    background: var(--tag-bg);
    color: var(--text-muted);
    padding: 2px 8px;
    border-radius: 10px;
  }
  .slot-tag {
    font-size: 10px;
    font-family: 'Courier New', monospace;
    background: rgba(201,124,58,0.18);
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 10px;
  }
  .btn-insert { background: var(--accent2); color: #fff; }

  /* ===== 差し込みチップ（編集モーダル内のライブプレビュー） ===== */
  .slot-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
    min-height: 20px;
  }
  .slot-chip {
    font-size: 11px;
    font-family: 'Courier New', monospace;
    background: rgba(201,124,58,0.18);
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 10px;
    border: 1px solid rgba(201,124,58,0.4);
  }
  .slot-chip-empty {
    font-size: 11px;
    color: var(--text-muted);
    font-family: inherit;
  }
  .field-hint {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 6px;
    line-height: 1.5;
  }
  .field-hint code {
    font-family: 'Courier New', monospace;
    background: var(--surface2);
    padding: 1px 5px;
    border-radius: 4px;
  }

  /* ===== 差し込みモーダル ===== */
  .insert-slot-row { margin-bottom: 12px; }
  .insert-slot-row label {
    display: block;
    font-size: 11px;
    font-family: 'Courier New', monospace;
    color: var(--accent);
    margin-bottom: 5px;
  }
  .insert-preview {
    background: var(--surface2);
    border: 1px dashed var(--border);
    border-radius: var(--radius-sm);
    padding: 12px;
    font-size: 13px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 200px;
    overflow-y: auto;
    margin-bottom: 8px;
  }
  .insert-warn {
    font-size: 11px;
    color: var(--danger);
    margin-bottom: 10px;
    min-height: 14px;
  }

  /* ===== ボタン共通 ===== */
  .btn {
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 12px;
    padding: 6px 12px;
    font-family: inherit;
    transition: opacity 0.15s, background 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: var(--accent); color: #fff; font-weight: 600; }
  .btn-ghost {
    background: var(--surface2);
    color: var(--text-muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--accent); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-sm { padding: 4px 8px; font-size: 11px; }
  .btn-copy { background: var(--tag-bg); color: var(--text-muted); }
  .btn-copy.copied { background: var(--success); color: #fff; }

  /* ===== 空状態 ===== */
  .empty {
    text-align: center;
    color: var(--text-muted);
    padding: 60px 20px;
    font-size: 13px;
  }
  .empty-icon { font-size: 32px; margin-bottom: 12px; }

  /* ===== モーダル ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal h3 {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 18px;
    color: var(--accent);
  }
  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 5px;
    letter-spacing: 0.05em;
  }
  .field input, .field textarea, .field select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 8px 10px;
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    border-color: var(--accent);
  }
  .field textarea { min-height: 160px; resize: vertical; line-height: 1.7; }
  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 20px;
  }

  /* ===== トースト ===== */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--success);
    color: #fff;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    z-index: 300;
    transition: transform 0.25s ease;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ===== スクロールバー ===== */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ===== レスポンシブ（スマホ） ===== */
  @media (max-width: 640px) {
    .layout {
      flex-direction: column;
      height: auto;
    }
    .sidebar {
      width: 100%;
      min-width: unset;
      border-right: none;
      border-bottom: 1px solid var(--border);
      flex-direction: row;
      align-items: center;
      overflow-x: auto;
      overflow-y: hidden;
      height: auto;
    }
    .sidebar-title { display: none; }
    .cat-list {
      display: flex;
      flex-direction: row;
      overflow-x: auto;
      flex: 1;
      padding: 6px 8px;
      gap: 4px;
    }
    .cat-item {
      white-space: nowrap;
      border-left: none;
      border-bottom: 3px solid transparent;
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
      padding: 7px 12px;
      flex-shrink: 0;
    }
    .cat-item.active {
      border-left-color: transparent;
      border-bottom-color: var(--accent);
    }
    .cat-edit-btn { display: none; }
    .sidebar-footer {
      border-top: none;
      border-left: 1px solid var(--border);
      padding: 6px 10px;
      flex-shrink: 0;
    }
    .sidebar-footer .btn {
      white-space: nowrap;
      font-size: 11px;
      padding: 6px 10px;
    }
    .main {
      padding: 14px;
      overflow-y: visible;
      height: auto;
    }
    .card-title { font-size: 13px; }
  }
</style>
</head>
<body>

<header>
  <h1>📋 プロンプト保管庫</h1>
  <span id="total-count"></span>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-title">カテゴリ</div>
    <div class="cat-list" id="cat-list"></div>
    <div class="sidebar-footer" style="display:flex; flex-direction:column; gap:6px;">
      <button class="btn btn-ghost" style="width:100%; font-size:12px;" onclick="openCatModal()">＋ カテゴリ追加</button>
      <button class="btn btn-ghost" style="width:100%; font-size:12px;" onclick="openBackupModal()">⚙ バックアップ</button>
    </div>
  </aside>

  <main class="main">
    <div class="main-header">
      <h2 id="main-title">すべて</h2>
      <button class="btn btn-primary" onclick="openPromptModal()">＋ 追加</button>
    </div>
    <div class="prompt-grid" id="prompt-list"></div>
  </main>
</div>

<!-- プロンプト追加/編集モーダル -->
<div class="modal-overlay" id="prompt-modal">
  <div class="modal">
    <h3 id="prompt-modal-title">プロンプト追加</h3>
    <div class="field">
      <label>タイトル</label>
      <input type="text" id="f-title" placeholder="例：九郎への引き継ぎ依頼">
    </div>
    <div class="field">
      <label>カテゴリ</label>
      <select id="f-cat"></select>
    </div>
    <div class="field">
      <label>プロンプト本文</label>
      <textarea id="f-body" placeholder="ここにプロンプトを貼り付け…" oninput="renderLiveSlotChips()"></textarea>
      <div class="field-hint">差し込みたい場所は <code>{{名前}}</code> の形で書くと、使うときに入力欄が出るで（例：<code>{{対象}}</code>）。</div>
      <div class="slot-chips" id="live-slot-chips"></div>
    </div>
    <div class="field">
      <label>メモ（任意）</label>
      <input type="text" id="f-memo" placeholder="使い方のヒントなど">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModals()">キャンセル</button>
      <button class="btn btn-danger btn-sm" id="delete-btn" style="display:none" onclick="deletePrompt()">削除</button>
      <button class="btn btn-primary" onclick="savePrompt()">保存</button>
    </div>
  </div>
</div>

<!-- カテゴリ追加/編集モーダル -->
<div class="modal-overlay" id="cat-modal">
  <div class="modal" style="max-width:360px">
    <h3 id="cat-modal-title">カテゴリ追加</h3>
    <div class="field">
      <label>カテゴリ名</label>
      <input type="text" id="f-cat-name" placeholder="例：引き継ぎ / 橋渡し">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModals()">キャンセル</button>
      <button class="btn btn-danger btn-sm" id="cat-delete-btn" style="display:none" onclick="deleteCat()">削除</button>
      <button class="btn btn-primary" onclick="saveCat()">保存</button>
    </div>
  </div>
</div>

<!-- 差し込みモーダル -->
<div class="modal-overlay" id="insert-modal">
  <div class="modal">
    <h3 id="insert-modal-title">差し込んでコピー</h3>
    <div id="insert-slot-list"></div>
    <div class="field">
      <label>結果プレビュー</label>
      <div class="insert-preview" id="insert-preview"></div>
      <div class="insert-warn" id="insert-warn"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModals()">閉じる</button>
      <button class="btn btn-primary" onclick="copyInsertResult()">コピーする</button>
    </div>
  </div>
</div>

<!-- バックアップモーダル -->
<div class="modal-overlay" id="backup-modal">
  <div class="modal">
    <h3>⚙ バックアップ</h3>
    <div class="field">
      <label>エクスポート</label>
      <p style="font-size:12px; color:var(--text-muted); margin-bottom:8px;">今のカテゴリ・プロンプトを全部、JSONファイルとして保存します。</p>
      <button class="btn btn-primary" style="width:100%;" onclick="exportData()">📤 JSONファイルを書き出す</button>
    </div>
    <div class="field" style="margin-top:16px;">
      <label>インポート</label>
      <p style="font-size:12px; color:var(--text-muted); margin-bottom:8px;">バックアップファイルを選ぶと、今のデータが<strong style="color:var(--danger);">上書き</strong>されます。</p>
      <input type="file" id="import-file-input" accept="application/json,.json" style="display:none;" onchange="handleImportFile(event)">
      <button class="btn btn-ghost" style="width:100%;" onclick="document.getElementById('import-file-input').click()">📥 ファイルを選んで復元</button>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModals()">閉じる</button>
    </div>
  </div>
</div>

<!-- トースト -->
<div class="toast" id="toast"></div>

<script>
// ===== データ =====
const STORAGE_KEY = 'prompt-vault-v1';
let state = { categories: [], prompts: [] };
let selectedCat = null; // null = すべて
let editingPromptId = null;
let editingCatId = null;
let insertingPromptId = null;

// ===== 差し込み（{{ }}）ユーティリティ =====
function extractSlots(text) {
  const re = /\{\{\s*([^{}]+?)\s*\}\}/g;
  const seen = [];
  let m;
  while ((m = re.exec(text)) !== null) {
    if (!seen.includes(m[1])) seen.push(m[1]);
  }
  return seen;
}

function applyDefaultIfEmpty() {
  if (state.categories.length === 0) {
    state.categories = [
      { id: 'cat-1', name: '引き継ぎ' },
      { id: 'cat-2', name: '橋渡し' },
      { id: 'cat-3', name: 'その他' }
    ];
    state.prompts = [
      {
        id: 'p-1', catId: 'cat-1', title: '九郎チャット引き継ぎ依頼',
        body: 'このチャットが長くなってきたので、新しいチャットに引き継ぐためのプロンプトを作ってほしい。\n\n以下を含めてまとめてください：\n- 現在取り組んでいるアプリ・作業の概要\n- 直近の決定事項・方針\n- 次にやること\n- 引き継ぎ先の九郎に伝えるべき注意点\n\n新しいチャットの最初に貼り付けるだけで続きから始められる形式にして。',
        memo: 'チャットが長くなったら使う'
      }
    ];
    return true;
  }
  return false;
}

// サーバー(KV)優先で読み込み、失敗したらローカルの控えにフォールバックする
async function loadData() {
  let loadedFromServer = false;
  try {
    const res = await fetch('/api/load');
    if (res.ok) {
      const data = await res.json();
      // データの形が正しいか確認（categories/promptsの配列があるか）してから採用する
      if (data && Array.isArray(data.categories) && Array.isArray(data.prompts)) {
        state = data;
        loadedFromServer = true;
      } else if (data) {
        console.warn('サーバーのデータが想定外の形やったから無視するで:', data);
      }
    }
  } catch (e) {
    console.warn('サーバーからの読み込み失敗。ローカルの控えを使うで:', e);
  }

  if (!loadedFromServer) {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) state = JSON.parse(raw);
    } catch (e) {}
  }

  const seeded = applyDefaultIfEmpty();
  if (seeded) {
    saveData();
  } else if (loadedFromServer) {
    // サーバーから取れた最新データをローカルの控えにも反映しておく
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
  }
}

// ローカルには即保存、サーバーへは裏で送る（失敗してもローカルは残る）
function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));

  fetch('/api/save', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(state)
  }).catch(e => {
    console.warn('サーバーへの保存失敗。ローカルには保存済みやで:', e);
  });
}

// ===== レンダリング =====
function render() {
  renderCats();
  renderPrompts();
  updateTotal();
}

function renderCats() {
  const list = document.getElementById('cat-list');
  const allCount = state.prompts.length;
  let html = `<div class="cat-item ${selectedCat === null ? 'active' : ''}" onclick="selectCat(null)">
    <span>すべて</span>
    <span class="cat-count">${allCount}</span>
  </div>`;
  for (const cat of state.categories) {
    const count = state.prompts.filter(p => p.catId === cat.id).length;
    html += `<div class="cat-item ${selectedCat === cat.id ? 'active' : ''}" onclick="selectCat('${cat.id}')">
      <span>${esc(cat.name)}</span>
      <span class="cat-count">${count}</span>
      <button class="cat-edit-btn" onclick="event.stopPropagation(); openCatModal('${cat.id}')">✏</button>
    </div>`;
  }
  list.innerHTML = html;
}

function renderPrompts() {
  const list = document.getElementById('prompt-list');
  const title = document.getElementById('main-title');
  let prompts = selectedCat === null
    ? state.prompts
    : state.prompts.filter(p => p.catId === selectedCat);

  if (selectedCat === null) {
    title.textContent = 'すべて';
  } else {
    const cat = state.categories.find(c => c.id === selectedCat);
    title.textContent = cat ? cat.name : '';
  }

  if (prompts.length === 0) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">📭</div>プロンプトがまだないわ<br>右上の「＋追加」から登録しよ</div>`;
    return;
  }

  list.innerHTML = prompts.map(p => {
    const cat = state.categories.find(c => c.id === p.catId);
    const slots = extractSlots(p.body);
    const hasSlots = slots.length > 0;
    const bodyClickAction = hasSlots ? `openInsertModal('${p.id}')` : `copyPrompt('${p.id}')`;
    return `<div class="prompt-card">
      <div class="card-top">
        <div class="card-title">${esc(p.title)}</div>
        <div class="card-actions">
          ${hasSlots ? `<button class="btn btn-sm btn-insert" onclick="openInsertModal('${p.id}')">差し込む</button>` : ''}
          <button class="btn btn-sm btn-copy" id="copy-${p.id}" onclick="copyPrompt('${p.id}')">コピー</button>
          <button class="btn btn-sm btn-ghost" onclick="openPromptModal('${p.id}')">編集</button>
        </div>
      </div>
      <div class="card-body" onclick="${bodyClickAction}">${esc(p.body)}</div>
      <div class="card-footer">
        ${cat ? `<span class="cat-tag">${esc(cat.name)}</span>` : ''}
        ${hasSlots ? `<span class="slot-tag">{{}} x${slots.length}</span>` : ''}
        ${p.memo ? `<span style="font-size:11px;color:var(--text-muted)">${esc(p.memo)}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

function updateTotal() {
  document.getElementById('total-count').textContent = `${state.prompts.length}件`;
}

function selectCat(id) {
  selectedCat = id;
  render();
}

// ===== コピー =====
// クリップボードAPIが使えない環境（file://で直接開いた場合など）向けのフォールバック付きコピー
function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    return navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
  }
  return fallbackCopy(text);
}

function fallbackCopy(text) {
  return new Promise((resolve, reject) => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      ta.style.top = '0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      if (ok) resolve(); else reject(new Error('execCommand copy failed'));
    } catch (e) {
      reject(e);
    }
  });
}

function copyPrompt(id) {
  const p = state.prompts.find(x => x.id === id);
  if (!p) return;
  copyToClipboard(p.body).then(() => {
    showToast('コピーしたで！');
    const btn = document.getElementById('copy-' + id);
    if (btn) { btn.textContent = 'コピー済'; btn.classList.add('copied'); setTimeout(() => { btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 2000); }
  }).catch(() => {
    showToast('コピーに失敗したわ');
  });
}

// ===== 差し込みモーダル =====
function openInsertModal(id) {
  const p = state.prompts.find(x => x.id === id);
  if (!p) return;
  insertingPromptId = id;
  const slots = extractSlots(p.body);
  document.getElementById('insert-modal-title').textContent = p.title;
  document.getElementById('insert-slot-list').innerHTML = slots.map(s => `
    <div class="insert-slot-row">
      <label>${esc(s)}</label>
      <input type="text" data-slot="${esc(s)}" placeholder="${esc(s)} を入力" oninput="updateInsertPreview()">
    </div>
  `).join('');
  updateInsertPreview();
  document.getElementById('insert-modal').classList.add('open');
}

function updateInsertPreview() {
  const p = state.prompts.find(x => x.id === insertingPromptId);
  if (!p) return;
  const inputs = document.querySelectorAll('#insert-slot-list input[data-slot]');
  const values = {};
  let emptyCount = 0;
  inputs.forEach(el => {
    values[el.dataset.slot] = el.value;
    if (!el.value.trim()) emptyCount++;
  });
  const output = p.body.replace(/\{\{\s*([^{}]+?)\s*\}\}/g, (whole, slotName) => {
    const v = values[slotName];
    return (v && v.trim()) ? v : whole;
  });
  document.getElementById('insert-preview').textContent = output;
  document.getElementById('insert-warn').textContent = emptyCount > 0
    ? `未入力の差し込み箇所が${emptyCount}件あるで（このままコピーすると {{ }} が残るよ）`
    : '';
}

function copyInsertResult() {
  const text = document.getElementById('insert-preview').textContent;
  copyToClipboard(text).then(() => {
    showToast('コピーしたで！');
  }).catch(() => {
    showToast('コピーに失敗したわ');
  });
}

// ===== プロンプトモーダル =====
function openPromptModal(id) {
  editingPromptId = id || null;
  const modal = document.getElementById('prompt-modal');
  const catSel = document.getElementById('f-cat');
  catSel.innerHTML = state.categories.map(c => `<option value="${c.id}">${esc(c.name)}</option>`).join('');
  
  if (id) {
    const p = state.prompts.find(x => x.id === id);
    document.getElementById('prompt-modal-title').textContent = 'プロンプト編集';
    document.getElementById('f-title').value = p.title;
    document.getElementById('f-body').value = p.body;
    document.getElementById('f-memo').value = p.memo || '';
    catSel.value = p.catId;
    document.getElementById('delete-btn').style.display = 'inline-block';
  } else {
    document.getElementById('prompt-modal-title').textContent = 'プロンプト追加';
    document.getElementById('f-title').value = '';
    document.getElementById('f-body').value = '';
    document.getElementById('f-memo').value = '';
    if (selectedCat) catSel.value = selectedCat;
    document.getElementById('delete-btn').style.display = 'none';
  }
  renderLiveSlotChips();
  modal.classList.add('open');
}

// ===== 差し込みチップのライブプレビュー（追加・編集モーダル内） =====
function renderLiveSlotChips() {
  const slots = extractSlots(document.getElementById('f-body').value);
  const box = document.getElementById('live-slot-chips');
  if (slots.length === 0) {
    box.innerHTML = `<span class="slot-chip-empty">差し込み箇所はまだなし</span>`;
    return;
  }
  box.innerHTML = slots.map(s => `<span class="slot-chip">${esc(s)}</span>`).join('');
}

function savePrompt() {
  const title = document.getElementById('f-title').value.trim();
  const body = document.getElementById('f-body').value.trim();
  const catId = document.getElementById('f-cat').value;
  const memo = document.getElementById('f-memo').value.trim();
  if (!title || !body) { showToast('タイトルと本文は必須やで'); return; }

  if (editingPromptId) {
    const p = state.prompts.find(x => x.id === editingPromptId);
    Object.assign(p, { title, body, catId, memo });
  } else {
    state.prompts.unshift({ id: 'p-' + Date.now(), catId, title, body, memo });
  }
  saveData(); render(); closeModals();
  showToast(editingPromptId ? '更新したで！' : '追加したで！');
}

function deletePrompt() {
  if (!editingPromptId) return;
  if (!confirm('このプロンプトを削除する？')) return;
  state.prompts = state.prompts.filter(x => x.id !== editingPromptId);
  saveData(); render(); closeModals();
  showToast('削除したで');
}

// ===== カテゴリモーダル =====
function openCatModal(id) {
  editingCatId = id || null;
  if (id) {
    const cat = state.categories.find(c => c.id === id);
    document.getElementById('cat-modal-title').textContent = 'カテゴリ編集';
    document.getElementById('f-cat-name').value = cat.name;
    document.getElementById('cat-delete-btn').style.display = 'inline-block';
  } else {
    document.getElementById('cat-modal-title').textContent = 'カテゴリ追加';
    document.getElementById('f-cat-name').value = '';
    document.getElementById('cat-delete-btn').style.display = 'none';
  }
  document.getElementById('cat-modal').classList.add('open');
}

function saveCat() {
  const name = document.getElementById('f-cat-name').value.trim();
  if (!name) { showToast('カテゴリ名を入れてな'); return; }
  if (editingCatId) {
    const cat = state.categories.find(c => c.id === editingCatId);
    cat.name = name;
  } else {
    state.categories.push({ id: 'cat-' + Date.now(), name });
  }
  saveData(); render(); closeModals();
  showToast(editingCatId ? 'カテゴリ更新したで' : 'カテゴリ追加したで');
}

function deleteCat() {
  if (!editingCatId) return;
  const count = state.prompts.filter(p => p.catId === editingCatId).length;
  const msg = count > 0
    ? `このカテゴリには${count}件のプロンプトがある。カテゴリだけ削除する？（プロンプトは残るよ）`
    : 'このカテゴリを削除する？';
  if (!confirm(msg)) return;
  state.categories = state.categories.filter(c => c.id !== editingCatId);
  if (selectedCat === editingCatId) selectedCat = null;
  saveData(); render(); closeModals();
  showToast('カテゴリ削除したで');
}

function closeModals() {
  document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('open'));
}

// オーバーレイクリックで閉じる
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModals(); });
});

// ===== バックアップ（エクスポート/インポート） =====
function openBackupModal() {
  document.getElementById('backup-modal').classList.add('open');
}

function exportData() {
  const json = JSON.stringify(state, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const stamp = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}-${pad(now.getHours())}${pad(now.getMinutes())}`;
  a.href = url;
  a.download = `prompt-vault-backup-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('バックアップを書き出しました');
}

function handleImportFile(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = e => {
    let imported;
    try {
      imported = JSON.parse(e.target.result);
    } catch (err) {
      showToast('読み込み失敗：JSONファイルではないようです');
      event.target.value = '';
      return;
    }
    if (!imported || !Array.isArray(imported.categories) || !Array.isArray(imported.prompts)) {
      showToast('読み込み失敗：保管庫のバックアップ形式ではありません');
      event.target.value = '';
      return;
    }
    const ok = confirm(`今のデータを上書きして復元します。\n\n復元後：カテゴリ${imported.categories.length}件 / プロンプト${imported.prompts.length}件\n\nこの操作は元に戻せません。よろしいですか？`);
    if (!ok) {
      event.target.value = '';
      return;
    }
    state = imported;
    saveData();
    selectedCat = null;
    render();
    closeModals();
    showToast('バックアップから復元しました');
    event.target.value = '';
  };
  reader.onerror = () => {
    showToast('ファイルの読み込みに失敗しました');
    event.target.value = '';
  };
  reader.readAsText(file);
}

// ===== トースト =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ===== ユーティリティ =====
function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== 起動 =====
loadData().then(() => {
  render();
});
</script>
